---
# Install Neovim (Tool Layer - mise) and deploy configuration

- name: Load Neovim variables
  include_vars: "{{ role_path }}/tasks/tools/neovim/vars.yml"

- name: Install Neovim via mise
  args:
    creates: "{{ ansible_facts['env']['HOME'] }}/.local/share/mise/installs/neovim/{{ neovim_version }}"
  environment:
    PATH: "{{ ansible_facts['env']['HOME'] }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"  # mise is installed in .local/bin
  shell: mise use -g neovim@{{ neovim_version }}

- name: Install .NET SDK via mise
  args:
    creates: "{{ ansible_facts['env']['HOME'] }}/.local/share/mise/installs/dotnet/{{ dotnet_version }}"
  environment:
    PATH: "{{ ansible_facts['env']['HOME'] }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"  # mise is installed in .local/bin
  shell: mise use -g dotnet@{{ dotnet_version }}

- name: Install Roslyn language server as a global .NET tool
  args:
    creates: "{{ ansible_facts['env']['HOME'] }}/.dotnet/tools/roslyn-language-server"
  environment:
    PATH: "{{ ansible_facts['env']['HOME'] }}/.local/bin:{{ ansible_facts['env']['HOME'] }}/.local/share/mise/shims:{{ ansible_facts['env']['PATH'] }}"
  shell: dotnet tool install --global roslyn-language-server --prerelease

- name: Install CSharpier as a global .NET tool
  args:
    creates: "{{ ansible_facts['env']['HOME'] }}/.dotnet/tools/csharpier"
  environment:
    PATH: "{{ ansible_facts['env']['HOME'] }}/.local/bin:{{ ansible_facts['env']['HOME'] }}/.local/share/mise/shims:{{ ansible_facts['env']['PATH'] }}"
  shell: dotnet tool install --global csharpier

- name: Ensure Neovim config directory exists
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config"
    state: directory
    mode: '0755'

- name: Remove old nvim config if exists
  file:
    path: "{{ ansible_facts['env']['HOME'] }}/.config/nvim"
    state: absent

- name: Symlink Neovim configuration
  file:
    src: "{{ role_path }}/tasks/tools/neovim/config/config"
    dest: "{{ ansible_facts['env']['HOME'] }}/.config/nvim"
    state: link
    follow: no
    force: yes

- name: Install Neovim dependencies
  become: yes
  pacman:
    name:
      - xclip              # Clipboard support
      - wl-clipboard       # Wayland clipboard support
      - tree-sitter        # Tree-sitter library (libtree-sitter)
      - tree-sitter-cli    # Tree-sitter CLI (provides /usr/bin/tree-sitter; kulala.nvim needs it)
    state: present

- name: Install stylua via mise
  args:
    creates: "{{ ansible_facts['env']['HOME'] }}/.local/share/mise/installs/stylua"
  environment:
    PATH: "{{ ansible_facts['env']['HOME'] }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"  # mise is installed in .local/bin
  shell: mise use -g stylua@latest

# Markdown "semantic line breaks" formatter (one sentence per line), used by
# conform for the `markdown` filetype. Not in mise's registry, so install it
# with the `github` backend (downloads the GitHub release binary; `ubi` does the
# same but is deprecated). `[exe=mdslw]` is required: the release asset is named
# `mdslw_x86_64-unknown-linux-musl`, and without it the installed executable
# keeps a mangled asset name instead of being called `mdslw`.
- name: Install mdslw via mise
  args:
    creates: "{{ ansible_facts['env']['HOME'] }}/.local/share/mise/installs/github-razziel89-mdslw"
  environment:
    PATH: "{{ ansible_facts['env']['HOME'] }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"  # mise is installed in .local/bin
  shell: mise use -g "github:razziel89/mdslw[exe=mdslw]"

# Used by conform for `yaml` and (chained ahead of mdslw) `markdown`. mdslw only
# splits sentences; prettier does the structural normalization such as blank
# lines around headings.
- name: Install prettier via mise
  args:
    creates: "{{ ansible_facts['env']['HOME'] }}/.local/share/mise/installs/npm-prettier"
  environment:
    PATH: "{{ ansible_facts['env']['HOME'] }}/.local/bin:{{ ansible_facts['env']['PATH'] }}"  # mise is installed in .local/bin
  shell: mise use -g "npm:prettier@latest"
